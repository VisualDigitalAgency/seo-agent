services:
  - type: web
    name: seo-agent-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py main_api:app
    healthCheckPath: /health
    disk:
      name: seo-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: DATAFORSEO_LOGIN
        sync: false
      - key: DATAFORSEO_PASSWORD
        sync: false
      - key: GA4_PROPERTY_ID
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GSC_CREDENTIALS_PATH
        value: "/data/gsc-credentials.json"
      - key: GA4_CREDENTIALS_PATH
        value: "/data/ga4-credentials.json"
      - key: API_KEYS
        sync: false
      - key: LOG_LEVEL
        value: "INFO"
      - key: WORKER_TIMEOUT
        value: "300"
