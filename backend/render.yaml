services:
  - type: web
    name: seo-agent-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main_api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: seo-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: FRONTEND_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: DATAFORSEO_LOGIN
        sync: false
      - key: DATAFORSEO_PASSWORD
        sync: false
      - key: GA4_PROPERTY_ID
        sync: false
