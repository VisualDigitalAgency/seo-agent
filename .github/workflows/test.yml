name: "Test & Lint"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest mypy types-requests

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v

      - name: Type check with mypy
        run: |
          cd backend
          mypy --ignore-missing-imports agents/ tools/ main_api.py pipeline.py fs_utils.py

      - name: Lint with flake8 (if installed)
        run: |
          pip install flake8
          cd backend
          flake8 --max-line-length=120 --exclude=__pycache__,*.pyc agents/ tools/ main_api.py || true

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint || true

      - name: Build check
        run: |
          cd frontend
          npm run build